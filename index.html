<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Audrey</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Public Sans', Helvetica, Arial, sans-serif;
    background: #F0F0EB;
    color: #000;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: stretch;
  }

  .shell {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 520px;
    background: #F9FAFB;
    overflow: hidden;
  }

  /* SCROLLABLE BODY */
  .body {
    flex: 1;
    overflow-y: auto;
    padding: 40px 28px 0;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .body::-webkit-scrollbar { display: none; }

  /* HEADER */
  .page-header { margin-bottom: 4px; }
  .page-title {
    font-size: 48px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -2px;
    text-transform: uppercase;
    color: #111;
  }
  .page-title .pink { color: #F089C1; }
  .page-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #aaa;
    margin-top: 10px;
  }

  /* MESSAGES */
  .msgs { display: flex; flex-direction: column; gap: 24px; }

  .msg { display: flex; flex-direction: column; gap: 8px; }
  .msg.user { align-items: flex-end; }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .msg.user .msg-meta { flex-direction: row-reverse; }

  .mav {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    filter: grayscale(100%);
  }
  .mav.u {
    background: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 700;
    color: #999;
    letter-spacing: 0.05em;
    filter: none;
  }

  .msg-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #aaa;
  }

  .bub {
    font-size: 15px;
    font-weight: 300;
    line-height: 1.65;
    color: #1f2937;
    max-width: 92%;
  }
  .msg.user .bub {
    background: #111;
    color: #fff;
    border-radius: 18px 18px 4px 18px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 400;
    max-width: 85%;
  }
  .bub p { margin-bottom: 8px; }
  .bub p:last-child { margin-bottom: 0; }

  /* SUGGESTION PILLS */
  .inline-sugs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding-left: 40px;
    margin-top: -8px;
  }
  .inline-sug {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border: 1px solid #e5e7eb;
    background: #fff;
    color: #555;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Public Sans', sans-serif;
    transition: all 0.15s;
    border-radius: 100px;
  }
  .inline-sug:hover { background: #111; border-color: #111; color: #fff; }

  .starter-sugs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding-left: 40px;
  }
  .starter-sug {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border: 1px solid #e5e7eb;
    background: #fff;
    color: #555;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Public Sans', sans-serif;
    transition: all 0.15s;
    border-radius: 100px;
  }
  .starter-sug:hover { background: #111; border-color: #111; color: #fff; }

  /* SPACER */
  .spacer { flex: 1; min-height: 24px; }

  /* TYPING */
  .tdots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .tdots span { width: 6px; height: 6px; border-radius: 50%; background: #d1d5db; animation: bl 1.2s infinite; }
  .tdots span:nth-child(2) { animation-delay: 0.15s; }
  .tdots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bl { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }

  /* INPUT */
  .inp-outer {
    background: rgba(249,250,251,0.96);
    backdrop-filter: blur(8px);
    padding: 20px 28px 24px;
    flex-shrink: 0;
    position: sticky;
    bottom: 0;
  }
  .inp-line {
    display: flex;
    align-items: center;
    border-bottom: 1.5px solid #d1d5db;
    transition: border-color 0.15s;
    padding-bottom: 8px;
  }
  .inp-line:focus-within { border-color: #111; }
  textarea {
    flex: 1;
    border: none;
    padding: 0;
    font-size: 14px;
    resize: none;
    background: transparent;
    color: #111;
    outline: none;
    font-family: 'Public Sans', sans-serif;
    font-weight: 300;
    line-height: 1.5;
    height: 24px;
  }
  textarea::placeholder { color: #bbb; }
  .sbtn {
    background: none;
    border: none;
    cursor: pointer;
    color: #bbb;
    display: flex;
    align-items: center;
    transition: color 0.15s;
    flex-shrink: 0;
    padding: 2px;
  }
  .sbtn:hover { color: #111; }
  .sbtn:disabled { opacity: 0.3; cursor: not-allowed; }
  .pwrd {
    text-align: center;
    margin-top: 16px;
    font-size: 9px;
    color: #ccc;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="shell">
  <div class="body" id="body">

    <div class="page-header">
      <div class="page-title">AUDREY<br>NEALE<span class="pink">.</span></div>
      <div class="page-eyebrow">Brand &amp; Content Lead — Payworks candidate</div>
    </div>

    <div class="msgs" id="msgs">
      <div class="msg audrey">
        <div class="msg-meta">
          <img class="mav" src="/chatface.png" onerror="this.style.display='none'">
          <span class="msg-name">Audrey 🦄</span>
        </div>
        <div class="bub"><p>Hi! I built this so you could skip the formalities and just ask me what you actually want to know.</p><p>What would you like to know?</p></div>
      </div>
    </div>

    <div class="starter-sugs" id="sugs">
      <button class="starter-sug" onclick="pick(this)">🤖 How do you use AI?</button>
      <button class="starter-sug" onclick="pick(this)">✍️ Copywriting experience</button>
      <button class="starter-sug" onclick="pick(this)">📈 Best results</button>
      <button class="starter-sug" onclick="pick(this)">👥 Leadership style</button>
      <button class="starter-sug" onclick="pick(this)">Why Payworks?</button>
      <button class="starter-sug" onclick="pick(this)">Day one plan?</button>
    </div>

    <div class="spacer"></div>

  </div>

  <div class="inp-outer">
    <div class="inp-line">
      <textarea id="inp" placeholder="Ask me anything..." onkeydown="kd(event)" oninput="rsz(this)"></textarea>
      <button class="sbtn" id="sbtn" onclick="go()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="pwrd">Powered by Claude</div>
  </div>
</div>

<script>
let hist=[], busy=false;

function rsz(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,80)+'px';
}

function kd(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}
}

function pick(btn){
  const txt=btn.textContent.replace(/^[^\w]*\s*/,'');
  document.getElementById('inp').value=txt;
  document.getElementById('sugs').style.display='none';
  go();
}

function scrollBottom(){
  const b=document.getElementById('body');
  b.scrollTop=b.scrollHeight;
}

function addMsg(role,text,sugs=[]){
  const msgs=document.getElementById('msgs');

  const w=document.createElement('div');
  w.className='msg '+(role==='user'?'user':'audrey');

  if(role==='user'){
    const meta=document.createElement('div');meta.className='msg-meta';
    const a=document.createElement('div');a.className='mav u';a.textContent='YOU';
    const n=document.createElement('span');n.className='msg-name';n.textContent='You';
    meta.appendChild(a);meta.appendChild(n);
    const b=document.createElement('div');b.className='bub';b.textContent=text;
    w.appendChild(meta);w.appendChild(b);
  } else {
    const meta=document.createElement('div');meta.className='msg-meta';
    const a=document.createElement('img');a.className='mav';a.src='/chatface.png';
    const n=document.createElement('span');n.className='msg-name';n.textContent='Audrey 🦄';
    meta.appendChild(a);meta.appendChild(n);
    const b=document.createElement('div');b.className='bub';
    b.innerHTML=text.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    w.appendChild(meta);w.appendChild(b);
  }

  msgs.appendChild(w);

  if(role==='assistant'&&sugs.length){
    const sd=document.createElement('div');sd.className='inline-sugs';
    sugs.forEach(s=>{
      const btn=document.createElement('button');btn.className='inline-sug';
      btn.textContent=s;
      btn.onclick=()=>{document.getElementById('inp').value=s;go();};
      sd.appendChild(btn);
    });
    msgs.appendChild(sd);
  }

  scrollBottom();
}

function showTyping(){
  const msgs=document.getElementById('msgs');
  const w=document.createElement('div');w.className='msg audrey';w.id='typ';
  const meta=document.createElement('div');meta.className='msg-meta';
  const a=document.createElement('img');a.className='mav';a.src='/chatface.png';
  const n=document.createElement('span');n.className='msg-name';n.textContent='Audrey 🦄';
  meta.appendChild(a);meta.appendChild(n);
  const b=document.createElement('div');b.className='bub';
  b.innerHTML='<div class="tdots"><span></span><span></span><span></span></div>';
  w.appendChild(meta);w.appendChild(b);
  msgs.appendChild(w);
  scrollBottom();
}

async function go(){
  if(busy)return;
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.style.height='auto';
  document.getElementById('sugs').style.display='none';
  busy=true;document.getElementById('sbtn').disabled=true;
  addMsg('user',txt);hist.push({role:'user',content:txt});
  showTyping();
  try{
    const r=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:hist})
    });
    const d=await r.json();
    document.getElementById('typ')?.remove();
    const rep=d.reply||'Something went wrong — try again!';
    const sugs=d.suggestions||[];
    addMsg('assistant',rep,sugs);
    hist.push({role:'assistant',content:rep});
  }catch(e){
    document.getElementById('typ')?.remove();
    addMsg('assistant','Something went wrong — try again!');
  }
  busy=false;document.getElementById('sbtn').disabled=false;
}
</script>
</body>
</html>
